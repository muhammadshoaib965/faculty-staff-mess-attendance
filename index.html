<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mess Bulk Entry System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for the data table */
        .table-container::-webkit-scrollbar { height: 8px; }
        .table-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        input[type="number"] { width: 60px; text-align: center; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 h-screen flex flex-col">

    <div class="bg-blue-800 text-white p-4 shadow-md flex flex-col md:flex-row justify-between items-center z-10 gap-4">
        <div>
            <h1 class="text-xl font-bold">Daily Mess Roster</h1>
            <p class="text-xs text-blue-200">Bulk Entry Portal</p>
        </div>
        
        <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="bg-white rounded p-1 flex-grow md:flex-grow-0">
                <input type="date" id="globalDate" class="w-full text-slate-800 text-sm p-1 outline-none font-semibold">
            </div>
            <button id="submitBtn" class="bg-green-500 hover:bg-green-600 px-6 py-2 rounded font-bold transition whitespace-nowrap shadow">
                Submit Data
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-hidden p-2 md:p-6">
        <div class="bg-white rounded-xl shadow-lg border border-slate-200 h-full flex flex-col">
            
            <div id="loading" class="p-8 text-center text-slate-500 font-semibold animate-pulse">
                Fetching Active Staff Members...
            </div>

            <div class="table-container overflow-auto hidden flex-1" id="tableContainer">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead class="bg-slate-50 sticky top-0 z-10 shadow-sm text-xs uppercase text-slate-500">
                        <tr>
                            <th class="p-3 border-b border-r bg-slate-50 sticky left-0 w-64">Staff Member</th>
                            <th class="p-3 border-b text-center">B</th>
                            <th class="p-3 border-b text-center">L</th>
                            <th class="p-3 border-b text-center border-r">D</th>
                            <th class="p-3 border-b text-center">Tea</th>
                            <th class="p-3 border-b text-center">Eggs</th>
                            <th class="p-3 border-b text-center">Milk</th>
                            <th class="p-3 border-b text-center">Roti</th>
                            <th class="p-3 border-b text-center border-r">Paratha</th>
                            <th class="p-3 border-b text-center">Special (Rs)</th>
                            <th class="p-3 border-b w-48">Remarks</th>
                        </tr>
                    </thead>
                    <tbody id="staffTableBody" class="text-sm divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // === PASTE YOUR NEW WEB APP URL HERE ===
        const WEB_APP_URL = "YOUR_WEB_APP_URL_GOES_HERE";

        // Set default date to today
        document.getElementById('globalDate').valueAsDate = new Date();

        // Fetch staff on page load
        window.onload = async () => {
            try {
                const response = await fetch(WEB_APP_URL);
                const result = await response.json();
                
                if (result.status === "success") {
                    populateTable(result.data);
                } else {
                    alert("Error loading staff: " + result.message);
                }
            } catch (error) {
                alert("Connection failed. Check your Web App URL and permissions.");
            }
        };

        // Build the table rows
        function populateTable(staffList) {
            const tbody = document.getElementById('staffTableBody');
            tbody.innerHTML = '';

            if(staffList.length === 0) {
                document.getElementById('loading').innerText = "No active staff found in Staff_Master.";
                return;
            }

            staffList.forEach(staff => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition staff-row";
                tr.dataset.email = staff.email;
                tr.dataset.name = staff.name;

                tr.innerHTML = `
                    <td class="p-3 border-r bg-white sticky left-0 group-hover:bg-blue-50">
                        <p class="font-bold text-slate-700 truncate w-48">${staff.name}</p>
                        <p class="text-[10px] text-slate-400 truncate w-48">${staff.email}</p>
                    </td>
                    <td class="p-3 text-center"><input type="checkbox" class="inp-b w-4 h-4 cursor-pointer"></td>
                    <td class="p-3 text-center"><input type="checkbox" class="inp-l w-4 h-4 cursor-pointer"></td>
                    <td class="p-3 text-center border-r"><input type="checkbox" class="inp-d w-4 h-4 cursor-pointer"></td>
                    <td class="p-3 text-center"><input type="number" min="0" class="inp-tea border rounded p-1 text-xs outline-none focus:border-blue-500"></td>
                    <td class="p-3 text-center"><input type="number" min="0" class="inp-eggs border rounded p-1 text-xs outline-none focus:border-blue-500"></td>
                    <td class="p-3 text-center"><input type="number" min="0" class="inp-milk border rounded p-1 text-xs outline-none focus:border-blue-500"></td>
                    <td class="p-3 text-center"><input type="number" min="0" class="inp-roti border rounded p-1 text-xs outline-none focus:border-blue-500"></td>
                    <td class="p-3 text-center border-r"><input type="number" min="0" class="inp-paratha border rounded p-1 text-xs outline-none focus:border-blue-500"></td>
                    <td class="p-3 text-center"><input type="number" min="0" placeholder="0" class="inp-cost border rounded p-1 text-xs outline-none focus:border-blue-500 w-16"></td>
                    <td class="p-3"><input type="text" placeholder="Notes..." class="inp-rem border rounded p-1 w-full text-xs outline-none focus:border-blue-500"></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('tableContainer').classList.remove('hidden');
        }

        // Submit Logic
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const btn = document.getElementById('submitBtn');
            const selectedDate = document.getElementById('globalDate').value;
            
            if(!selectedDate) return alert("Please select a date.");

            const rows = document.querySelectorAll('.staff-row');
            const payload = [];

            // Iterate through every active staff member row
            rows.forEach(row => {
                const b = row.querySelector('.inp-b').checked;
                const l = row.querySelector('.inp-l').checked;
                const d = row.querySelector('.inp-d').checked;
                
                const tea = parseInt(row.querySelector('.inp-tea').value) || 0;
                const eggs = parseInt(row.querySelector('.inp-eggs').value) || 0;
                const milk = parseInt(row.querySelector('.inp-milk').value) || 0;
                const roti = parseInt(row.querySelector('.inp-roti').value) || 0;
                const paratha = parseInt(row.querySelector('.inp-paratha').value) || 0;
                const cost = parseFloat(row.querySelector('.inp-cost').value) || 0;
                const rem = row.querySelector('.inp-rem').value.trim();

                // Only add to payload if they actually had a meal or extra
                if (b || l || d || tea > 0 || eggs > 0 || milk > 0 || roti > 0 || paratha > 0 || cost > 0 || rem !== "") {
                    payload.push({
                        date: selectedDate,
                        name: row.dataset.name,
                        email: row.dataset.email,
                        breakfast: b, lunch: l, dinner: d,
                        tea: tea, eggs: eggs, milk: milk, roti: roti, paratha: paratha, specialCost: cost, remarks: rem
                    });
                }
            });

            if (payload.length === 0) {
                return alert("No data entered. Please fill out meals for at least one person.");
            }

            // Send to Google Apps Script
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if(result.status === "success") {
                    alert(`Success! Saved ${result.inserted} records to the sheet.`);
                    // Clear the form but keep the date
                    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                    document.querySelectorAll('input[type="number"], input[type="text"]').forEach(inp => inp.value = "");
                } else {
                    alert("Error saving: " + result.message);
                }
            } catch (error) {
                alert("Network error. Could not connect to Google Sheets.");
            } finally {
                btn.innerText = "Submit Data";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
