<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Staff Attendance & Mess Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans text-slate-800">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-md overflow-hidden border border-slate-200">
        <div class="bg-blue-700 p-6 text-white text-center">
            <h1 class="text-2xl font-bold tracking-wide">Daily Faculty Mess Entry</h1>
            <p class="text-blue-100 text-sm mt-1">NU Mess Services</p>
        </div>

        <form id="attendanceForm" class="p-6 md:p-8 space-y-8">
            
            <div>
                <h2 class="text-lg font-semibold border-b pb-2 mb-4 text-slate-700">Staff Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Date</label>
                        <input type="date" id="date" required class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Email</label>
                        <input type="email" id="email" required placeholder="name@nu.edu.pk" class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Full Name</label>
                        <input type="text" id="name" required placeholder="e.g. Mr. Adeel Haider" class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>
            </div>

            <div>
                <h2 class="text-lg font-semibold border-b pb-2 mb-4 text-slate-700">Standard Meals</h2>
                <div class="flex space-x-6">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="breakfast" class="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                        <span class="font-medium text-slate-700">Breakfast</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="lunch" class="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                        <span class="font-medium text-slate-700">Lunch</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="dinner" class="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                        <span class="font-medium text-slate-700">Dinner</span>
                    </label>
                </div>
            </div>

            <div>
                <h2 class="text-lg font-semibold border-b pb-2 mb-4 text-slate-700">Item Quantities</h2>
                <div class="grid grid-cols-2 md:grid-cols-6 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Tea</label>
                        <input type="number" id="tea" min="0" value="0" class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Eggs</label>
                        <input type="number" id="eggs" min="0" value="0" class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Milk</label>
                        <input type="number" id="milk" min="0" value="0" class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Roti</label>
                        <input type="number" id="roti" min="0" value="0" class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Paratha</label>
                        <input type="number" id="paratha" min="0" value="0" class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Others</label>
                        <input type="number" id="others" min="0" value="0" class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>
            </div>

            <div>
                <h2 class="text-lg font-semibold border-b pb-2 mb-4 text-slate-700">Extras & Remarks</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-1">
                        <label class="block text-sm font-medium text-slate-600 mb-1">Special Order Cost (Rs)</label>
                        <input type="number" id="specialCost" min="0" value="0" class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-600 mb-1">Remarks</label>
                        <input type="text" id="remarks" placeholder="Optional notes..." class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded-md transition-colors duration-200">
                Submit Record
            </button>
            
            <p id="statusMsg" class="text-center font-semibold mt-4 hidden"></p>
        </form>
    </div>

    <script>
        // --- PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE ---
        const WEB_APP_URL = "YOUR_WEB_APP_URL_GOES_HERE";

        // Auto-fill today's date
        document.getElementById('date').valueAsDate = new Date();

        document.getElementById('attendanceForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMsg');
            
            btn.innerText = "Submitting...";
            btn.disabled = true;
            btn.classList.add("opacity-70");
            status.classList.add('hidden');

            // Gather data from form
            const payload = {
                date: document.getElementById('date').value,
                email: document.getElementById('email').value,
                name: document.getElementById('name').value,
                breakfast: document.getElementById('breakfast').checked,
                lunch: document.getElementById('lunch').checked,
                dinner: document.getElementById('dinner').checked,
                tea: document.getElementById('tea').value,
                eggs: document.getElementById('eggs').value,
                milk: document.getElementById('milk').value,
                roti: document.getElementById('roti').value,
                paratha: document.getElementById('paratha').value,
                others: document.getElementById('others').value,
                specialCost: document.getElementById('specialCost').value,
                remarks: document.getElementById('remarks').value
            };

            try {
                // Send to Google Sheet
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    // Using text/plain avoids strict CORS preflight checks in Apps Script
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                status.innerText = "Success! Record added to sheet.";
                status.className = "text-center font-semibold mt-4 text-green-600 block";
                
                // Reset standard fields, keep Date
                document.getElementById('attendanceForm').reset();
                document.getElementById('date').valueAsDate = new Date();

            } catch (error) {
                status.innerText = "Error: Could not save record.";
                status.className = "text-center font-semibold mt-4 text-red-600 block";
            } finally {
                btn.innerText = "Submit Record";
                btn.disabled = false;
                btn.classList.remove("opacity-70");
                
                // Hide success message after 3 seconds
                setTimeout(() => { status.classList.add('hidden'); }, 3000);
            }
        });
    </script>
</body>
</html>
