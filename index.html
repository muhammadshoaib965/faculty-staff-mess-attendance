<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Mess Card Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        input[type="number"] { width: 60px; text-align: center; }
        /* Weekend highlighting */
        .weekend-row { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 h-screen flex flex-col">

    <div class="bg-blue-800 text-white p-4 shadow-md z-10">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 max-w-7xl mx-auto">
            <div>
                <h1 class="text-xl font-bold">Individual Monthly Card</h1>
                <p class="text-xs text-blue-200">Select a person and month to enter data</p>
            </div>
            
            <div class="flex flex-wrap items-end gap-3 w-full md:w-auto">
                <div class="flex flex-col">
                    <label class="text-[10px] text-blue-200 uppercase font-bold pr-1">Staff Member</label>
                    <select id="staffSelect" class="bg-white text-slate-800 text-sm p-2 rounded outline-none w-64 border-none shadow-sm disabled:opacity-50">
                        <option value="">Loading Staff...</option>
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-[10px] text-blue-200 uppercase font-bold pr-1">Month & Year</label>
                    <input type="month" id="monthSelect" class="bg-white text-slate-800 text-sm p-2 rounded outline-none shadow-sm cursor-pointer">
                </div>

                <button id="generateBtn" class="bg-blue-600 hover:bg-blue-500 border border-blue-400 px-4 py-2 rounded text-sm font-bold transition shadow-sm">
                    Load Month
                </button>
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-hidden p-2 md:p-6 max-w-7xl mx-auto w-full">
        <div class="bg-white rounded-xl shadow-lg border border-slate-200 h-full flex flex-col relative">
            
            <div id="statusMessage" class="absolute inset-0 flex items-center justify-center bg-white/90 z-20 rounded-xl">
                <div class="text-center text-slate-500 font-medium bg-white p-6 rounded shadow-sm border">
                    <svg class="w-12 h-12 mx-auto text-blue-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span id="statusText">Fetching Active Staff...</span>
                </div>
            </div>

            <div class="p-4 border-b bg-slate-50 flex justify-between items-center hidden" id="tableHeader">
                <div>
                    <h2 class="text-lg font-bold text-slate-700" id="selectedStaffName">Name</h2>
                    <p class="text-xs text-slate-500" id="selectedStaffEmail">Email</p>
                </div>
                <button id="submitBtn" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded font-bold transition shadow">
                    Save Month Data
                </button>
            </div>

            <div class="table-container overflow-auto hidden flex-1" id="tableContainer">
                <table class="w-full text-left border-collapse min-w-[900px]">
                    <thead class="bg-slate-100 sticky top-0 z-10 shadow-sm text-xs uppercase text-slate-600">
                        <tr>
                            <th class="p-3 border-b border-r sticky left-0 bg-slate-100 w-32 shadow-[1px_0_0_#e2e8f0]">Date</th>
                            <th class="p-3 border-b text-center">B</th>
                            <th class="p-3 border-b text-center">L</th>
                            <th class="p-3 border-b text-center border-r">D</th>
                            <th class="p-3 border-b text-center">Tea</th>
                            <th class="p-3 border-b text-center">Eggs</th>
                            <th class="p-3 border-b text-center">Milk</th>
                            <th class="p-3 border-b text-center">Roti</th>
                            <th class="p-3 border-b text-center border-r">Paratha</th>
                            <th class="p-3 border-b text-center">Special (Rs)</th>
                            <th class="p-3 border-b w-48">Remarks</th>
                        </tr>
                    </thead>
                    <tbody id="monthTableBody" class="text-sm divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // === PASTE YOUR EXISTING WEB APP URL HERE ===
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwcZmusDN5_QnY-fhWl03-FERjiwNheHnNkgVR-ES1Vge3tYvbnGpnZIbmBf7lLdHWo9g/exec";

        let activeStaffList = [];

        // Setup current month on load
        const today = new Date();
        const monthInput = document.getElementById('monthSelect');
        // Format YYYY-MM
        monthInput.value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;

        // Fetch staff on page load
        window.onload = async () => {
            const statusText = document.getElementById('statusText');
            const staffSelect = document.getElementById('staffSelect');
            
            try {
                const response = await fetch(WEB_APP_URL);
                const result = await response.json();
                
                if (result.status === "success") {
                    activeStaffList = result.data;
                    
                    // Populate Dropdown
                    staffSelect.innerHTML = '<option value="" disabled selected>-- Select Staff Member --</option>';
                    activeStaffList.forEach((staff, index) => {
                        const opt = document.createElement('option');
                        opt.value = index; // Store array index to retrieve data later
                        opt.text = staff.name;
                        staffSelect.appendChild(opt);
                    });
                    
                    statusText.innerText = "Ready. Select a person and month.";
                    document.getElementById('statusMessage').classList.add('bg-white/50');
                    // Hide overlay if user interacts
                    staffSelect.addEventListener('change', () => document.getElementById('statusMessage').classList.add('hidden'));

                } else {
                    statusText.innerText = "Error: " + result.message;
                    statusText.className = "text-red-500 font-bold";
                }
            } catch (error) {
                statusText.innerText = "Connection failed. Check Web App URL.";
                statusText.className = "text-red-500 font-bold";
            }
        };

        // Generate the Monthly Grid
        document.getElementById('generateBtn').addEventListener('click', () => {
            const staffIndex = document.getElementById('staffSelect').value;
            const monthVal = document.getElementById('monthSelect').value;

            if (staffIndex === "") return alert("Please select a staff member first.");
            if (!monthVal) return alert("Please select a month.");

            const selectedStaff = activeStaffList[staffIndex];
            
            // Extract Year and Month
            const [year, month] = monthVal.split('-');
            // Get number of days in that month (passing 0 gets last day of previous month, so we use month directly which is 1-indexed for the next month naturally in JS)
            const daysInMonth = new Date(year, month, 0).getDate();

            // Update UI headers
            document.getElementById('selectedStaffName').innerText = selectedStaff.name;
            document.getElementById('selectedStaffEmail').innerText = selectedStaff.email;
            document.getElementById('selectedStaffEmail').dataset.email = selectedStaff.email; // hidden data

            const tbody = document.getElementById('monthTableBody');
            tbody.innerHTML = '';

            const daysOfWeek = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

            for (let day = 1; day <= daysInMonth; day++) {
                // Create strict format date: YYYY-MM-DD
                const dateString = `${year}-${month}-${String(day).padStart(2, '0')}`;
                const dateObj = new Date(year, month - 1, day);
                const dayName = daysOfWeek[dateObj.getDay()];
                const isWeekend = (dayName === "Sat" || dayName === "Sun");

                const tr = document.createElement('tr');
                tr.className = `hover:bg-blue-50 transition day-row ${isWeekend ? 'weekend-row' : ''}`;
                tr.dataset.date = dateString;

                tr.innerHTML = `
                    <td class="p-3 border-r sticky left-0 shadow-[1px_0_0_#e2e8f0] ${isWeekend ? 'bg-slate-50' : 'bg-white'} group-hover:bg-blue-50 z-0">
                        <div class="flex justify-between items-center w-full">
                            <span class="font-bold text-slate-700">${String(day).padStart(2, '0')}</span>
                            <span class="text-xs ${isWeekend ? 'text-red-400 font-bold' : 'text-slate-400'}">${dayName}</span>
                        </div>
                    </td>
                    <td class="p-3 text-center"><input type="checkbox" class="inp-b w-4 h-4 cursor-pointer"></td>
                    <td class="p-3 text-center"><input type="checkbox" class="inp-l w-4 h-4 cursor-pointer"></td>
                    <td class="p-3 text-center border-r"><input type="checkbox" class="inp-d w-4 h-4 cursor-pointer"></td>
                    <td class="p-3 text-center"><input type="number" min="0" class="inp-tea border rounded p-1 text-xs outline-none focus:border-blue-500"></td>
                    <td class="p-3 text-center"><input type="number" min="0" class="inp-eggs border rounded p-1 text-xs outline-none focus:border-blue-500"></td>
                    <td class="p-3 text-center"><input type="number" min="0" class="inp-milk border rounded p-1 text-xs outline-none focus:border-blue-500"></td>
                    <td class="p-3 text-center"><input type="number" min="0" class="inp-roti border rounded p-1 text-xs outline-none focus:border-blue-500"></td>
                    <td class="p-3 text-center border-r"><input type="number" min="0" class="inp-paratha border rounded p-1 text-xs outline-none focus:border-blue-500"></td>
                    <td class="p-3 text-center"><input type="number" min="0" placeholder="0" class="inp-cost border rounded p-1 text-xs outline-none focus:border-blue-500 w-16"></td>
                    <td class="p-3"><input type="text" placeholder="Notes..." class="inp-rem border rounded p-1 w-full text-xs outline-none focus:border-blue-500"></td>
                `;
                tbody.appendChild(tr);
            }

            document.getElementById('statusMessage').classList.add('hidden');
            document.getElementById('tableHeader').classList.remove('hidden');
            document.getElementById('tableContainer').classList.remove('hidden');
        });

        // Submit Logic
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const btn = document.getElementById('submitBtn');
            const rows = document.querySelectorAll('.day-row');
            const payload = [];

            const staffName = document.getElementById('selectedStaffName').innerText;
            const staffEmail = document.getElementById('selectedStaffEmail').dataset.email;

            // Go through every day of the month
            rows.forEach(row => {
                const b = row.querySelector('.inp-b').checked;
                const l = row.querySelector('.inp-l').checked;
                const d = row.querySelector('.inp-d').checked;
                
                const tea = parseInt(row.querySelector('.inp-tea').value) || 0;
                const eggs = parseInt(row.querySelector('.inp-eggs').value) || 0;
                const milk = parseInt(row.querySelector('.inp-milk').value) || 0;
                const roti = parseInt(row.querySelector('.inp-roti').value) || 0;
                const paratha = parseInt(row.querySelector('.inp-paratha').value) || 0;
                const cost = parseFloat(row.querySelector('.inp-cost').value) || 0;
                const rem = row.querySelector('.inp-rem').value.trim();
                const rowDate = row.dataset.date;

                // Only grab rows where the user actually typed or checked something
                if (b || l || d || tea > 0 || eggs > 0 || milk > 0 || roti > 0 || paratha > 0 || cost > 0 || rem !== "") {
                    payload.push({
                        date: rowDate,
                        name: staffName,
                        email: staffEmail,
                        breakfast: b, lunch: l, dinner: d,
                        tea: tea, eggs: eggs, milk: milk, roti: roti, paratha: paratha, specialCost: cost, remarks: rem
                    });
                }
            });

            if (payload.length === 0) return alert("No data entered. Please fill out meals for at least one day.");

            btn.innerText = "Saving...";
            btn.disabled = true;

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if(result.status === "success") {
                    alert(`Success! Saved ${result.inserted} daily records to the sheet for ${staffName}.`);
                    // Clear inputs so we don't accidentally double-submit
                    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                    document.querySelectorAll('input[type="number"], input[type="text"]').forEach(inp => inp.value = "");
                } else {
                    alert("Error saving: " + result.message);
                }
            } catch (error) {
                alert("Network error.");
            } finally {
                btn.innerText = "Save Month Data";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
